<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Application de Messages</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <header>
      <h1>Messagerie Instantanée</h1>
    </header>

    <main>
      <section id="controls">
        <button id="update-button">Mettre à jour</button>
        <button id="toggle-theme">Dark Mode</button>
      </section>

      <section id="server-section">
        <h2>Configuration du micro-service</h2>
        <div class="input-group">
          <input
            type="text"
            id="server-url"
            placeholder="URL du micro-service, ex: https://mon-serveur.repl.co"
          >
        </div>
      </section>

      <section id="messages-section">
        <h2>Messages récents</h2>
        <ul id="message-list"></ul>
      </section>

      <section id="post-section">
        <h2>Poster un nouveau message</h2>
        <div class="input-group">
          <label for="pseudo-input" class="sr-only">Pseudo</label>
          <input
            type="text"
            id="pseudo-input"
            placeholder="Votre pseudo"
          >

          <label for="message-input" class="sr-only">Contenu du message</label>
          <textarea
            id="message-input"
            placeholder="Tapez votre message ici..."
          ></textarea>

          <button id="send-button">Envoyer le message</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
